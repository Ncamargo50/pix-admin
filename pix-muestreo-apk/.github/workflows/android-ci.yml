name: Android CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  # Tag push triggers a release build + Play Console upload.
  workflow_dispatch:

concurrency:
  # Cancel outdated PR builds; keep one per branch.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  js-lint:
    name: JS syntax + lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: node --check on every JS source
        run: |
          set -e
          for f in app/src/main/assets/js/*.js app/src/main/assets/sw.js; do
            echo "=== $f ==="
            node --check "$f"
          done

  build-debug:
    name: Debug APK
    runs-on: ubuntu-latest
    needs: js-lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Build debug APK
        run: ./gradlew :app:assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: app-debug.apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

  maestro:
    name: Maestro smoke test
    runs-on: ubuntu-latest
    needs: build-debug
    # Skip in forks — the staging credentials aren't exposed to PRs.
    if: ${{ !github.event.pull_request.head.repo.fork }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: app-debug.apk
          path: .
      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH
      - name: Run flows on Maestro Cloud
        env:
          MAESTRO_CLOUD_API_KEY: ${{ secrets.MAESTRO_CLOUD_API_KEY }}
          PIX_TEST_EMAIL: ${{ secrets.PIX_TEST_EMAIL }}
          PIX_TEST_PASSWORD: ${{ secrets.PIX_TEST_PASSWORD }}
          PIX_RUN_ID: ${{ github.run_id }}
        run: |
          maestro cloud \
            --api-key "$MAESTRO_CLOUD_API_KEY" \
            --flows .maestro/ \
            --env PIX_TEST_EMAIL="$PIX_TEST_EMAIL" \
            --env PIX_TEST_PASSWORD="$PIX_TEST_PASSWORD" \
            --env PIX_RUN_ID="$PIX_RUN_ID" \
            app-debug.apk

  build-release:
    name: Signed release APK + AAB
    runs-on: ubuntu-latest
    needs: [js-lint, build-debug]
    # Only on tag push (vX.Y.Z) — never on PRs.
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Write signing credentials to env
        run: |
          echo "${{ secrets.PIX_KEYSTORE_B64 }}" | base64 -d > $HOME/pixadvisor.keystore
          echo "PIX_KEYSTORE_FILE=$HOME/pixadvisor.keystore" >> $GITHUB_ENV
          echo "PIX_KEYSTORE_PASSWORD=${{ secrets.PIX_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "PIX_KEY_ALIAS=${{ secrets.PIX_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "PIX_KEY_PASSWORD=${{ secrets.PIX_KEY_PASSWORD }}" >> $GITHUB_ENV
      - uses: gradle/actions/setup-gradle@v4
      - name: Build signed APK + AAB
        run: ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: release
          path: |
            app/build/outputs/apk/release/app-release.apk
            app/build/outputs/bundle/release/app-release.aab
          retention-days: 90

      - name: Upload AAB to Play Console (Internal track)
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: network.pixadvisor.muestreo
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
          mappingFile: app/build/outputs/mapping/release/mapping.txt
